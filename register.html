<div class="page-container"><div class="card"><h1><i class="fas fa-user-lock"></i> Sign in / Create account</h1><div style="display:flex; gap:2rem; flex-wrap:wrap;"><div style="flex:1"><h3>Login</h3><form id="loginForm"><input type="email" placeholder="Email" required><input type="password" placeholder="Password" required><button type="submit">Sign In</button><div id="loginMsg" style="display:none;" class="success-msg"></div></form></div><div style="flex:1"><h3>Register</h3><form id="registerForm"><input type="text" placeholder="Full name" required><input type="email" placeholder="Email" required><input type="password" placeholder="Password" minlength="6" required><input type="password" placeholder="Confirm Password" required><button type="submit">Register</button><div id="regMsg" style="display:none;" class="success-msg"></div></form></div></div></div></div>
<script>document.getElementById('loginForm')?.addEventListener('submit',(e)=>{e.preventDefault();let email=e.target.querySelector('input[type="email"]').value;if(!email.includes('@')){alert("Enter valid email");return;}document.getElementById('loginMsg').innerHTML="✅ Login successful (demo, no backend). Welcome back!";document.getElementById('loginMsg').style.display='block';setTimeout(()=>document.getElementById('loginMsg').style.display='none',2500);});document.getElementById('registerForm')?.addEventListener('submit',(e)=>{e.preventDefault();let pass=e.target.querySelectorAll('input[type="password"]')[0].value;let confirm=e.target.querySelectorAll('input[type="password"]')[1].value;let email=e.target.querySelector('input[type="email"]').value;if(pass!==confirm){alert("Passwords do not match");return;}if(pass.length<6){alert("Password must be at least 6 characters");return;}if(!email.includes('@')){alert("Valid email required");return;}document.getElementById('regMsg').innerHTML="🎉 Registration successful! (demo) You can now login.";document.getElementById('regMsg').style.display='block';setTimeout(()=>document.getElementById('regMsg').style.display='none',3000);e.target.reset();});</script>
