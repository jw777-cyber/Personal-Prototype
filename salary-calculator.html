<div class="page-container"><div class="card"><h1><i class="fas fa-dollar-sign"></i> Salary Calculator</h1><form id="salaryForm"><div class="form-group"><label>Hourly rate / Monthly (approx)</label><input type="number" id="hourlyRate" placeholder="$1,000"></div><div class="form-group"><label>Location (City, State)</label><input type="text" id="locationSalary" placeholder="San Francisco, CA"></div><div class="form-group"><label>Experience Level</label><select id="expLevel"><option>Entry Level ($0-$4,999/mo)</option><option>Mid-Level ($5,000-$9,999)</option><option>Senior ($10,000+)</option></select></div><button type="button" id="calcSalaryBtn">Calculate Salary Estimate</button><div id="salaryResult" class="success-msg" style="display:none; margin-top:1rem;"></div></form></div></div>
<script>document.getElementById('calcSalaryBtn')?.addEventListener('click',()=>{let hourly=document.getElementById('hourlyRate').value;let loc=document.getElementById('locationSalary').value;let exp=document.getElementById('expLevel').value;let estimate="$85,000 - $110,000 annually";if(exp.includes('Entry')) estimate="$55,000 - $70,000";if(exp.includes('Mid')) estimate="$80,000 - $105,000";if(exp.includes('Senior')) estimate="$120,000 - $165,000";document.getElementById('salaryResult').innerHTML=`💰 Estimated salary range for ${loc||"your area"}: ${estimate}`;document.getElementById('salaryResult').style.display='block';});</script>
