<div class="page-container"><div class="card"><h1><i class="fas fa-chart-simple"></i> Skill Gap Analyzer</h1><label>Target Role:</label><select id="targetRoleSelect"><option>Frontend Developer</option><option>Data Scientist</option><option>Product Manager</option><option>DevOps Engineer</option></select><button id="analyzeGapBtn">Analyze Skill Gap</button><div id="gapResult" class="success-msg" style="display:none; margin-top:1rem;"></div></div></div>
<script>document.getElementById('analyzeGapBtn')?.addEventListener('click',()=>{let role=document.getElementById('targetRoleSelect').value;let gaps="";if(role==='Frontend Developer') gaps="Missing: Advanced React, TypeScript, performance optimization.";else if(role==='Data Scientist') gaps="Gaps: Python ML libraries, SQL, A/B testing, communication.";else if(role==='Product Manager') gaps="Gaps: data analytics, user research, roadmap planning.";else gaps="Gaps: CI/CD pipelines, Kubernetes, Infrastructure as Code.";document.getElementById('gapResult').innerHTML=`🔍 For ${role}: ${gaps}<br>Recommended learning plan: 2 months targeted courses.`;document.getElementById('gapResult').style.display='block';});</script>
